services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ./db/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
      - ./db/002_seed.sql:/docker-entrypoint-initdb.d/002_seed.sql
      - ./db/003_expand_node_types.sql:/docker-entrypoint-initdb.d/003_expand_node_types.sql
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  admin-backend:
    build: ./WellnessAdmin-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      PORT: "3001"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3001:3001"

  app-backend:
    build: ./WellnessApp-backend
    environment:
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}
      PORT: "3002"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3002:3002"

  app-frontend:
    build: ./WellnessApp-frontend
    ports:
      - "5174:80"
    depends_on:
      - app-backend

  admin-frontend:
    build: ./WellnesAdmin-frontend
    ports:
      # exposes admin frontend locally as well
      - "5175:80"
    depends_on:
      - admin-backend

  caddy:
    image: caddy:2-alpine
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    ports:
      - "80:80"
    depends_on:
      - admin-backend
      - admin-frontend
      - app-backend
      - app-frontend

volumes:
  pgdata:
